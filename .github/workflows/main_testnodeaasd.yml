name: Build and deploy Docker image to Azure Web App - AppWebTestAzureContainer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          # Эти секреты (ACR_...) у вас уже были на первом скриншоте, оставьте их
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push container image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/next-app:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/next-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # Нам больше не нужен шаг "Login to Azure" с ClientID и TenantID!

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          # Имя вашего приложения (проверьте, pv33 или itstep-pv33-mk, на разных скринах было по-разному)
          app-name: 'AppWebTestAzureContainer'
          # Используем новый секрет, в который вы сохранили XML
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          # Указываем, какой образ деплоить
          images: '${{ secrets.ACR_LOGIN_SERVER }}/next-app:latest'