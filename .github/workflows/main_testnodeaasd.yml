# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
name: Build and deploy Docker image to Azure Web App - testNodeaasd

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push container image
        run: |
          # Собираем образ. Мы используем секрет ACR_LOGIN_SERVER для тега
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/next-app:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/next-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D6C98C4933544112936840B6FDE4AA98 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_70336B59D2064C8284E43C787D5FB1CE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FC3C50A3C4A448AC93FB7DC86D971ED2 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'itstep-pv33-mk'
          images: '${{ secrets.ACR_LOGIN_SERVER }}/next-app:latest'